controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    gripper_controller:
      type: effort_controllers/GripperActionController

gripper_controller:
  ros__parameters:
    joint: gripper_joint
    goal_tolerance: 0.001
    max_effort: 100.0
    allow_stalling: true    # Đổi thành TRUE để báo SUCCEEDED khi gắp trúng vật!
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    
    # MANG BỘ PID VỀ NHÀ CỦA GRIPPER_CONTROLLER:
    gains:
      gripper_joint:
        p: 100.0
        i: 5.0
        d: 10.0

# Xóa (hoặc comment) toàn bộ phần gazebo_ros2_control cũ đi vì giờ không cần nó tính PID nữa.